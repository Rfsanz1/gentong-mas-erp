kind = "web"
previewPath = "/"
title = "Fokus ERP"
version = "1.0.0"
id = "artifacts/fokus-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23370

[services.development]
run = "pnpm --filter @workspace/fokus-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fokus-erp", "run", "build" ]
publicDir = "artifacts/fokus-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23370"
BASE_PATH = "/"
